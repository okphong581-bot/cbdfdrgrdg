name: Build Pure Native TrollStore Menu

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Install Dependencies
        run: brew install xcodegen ldid
        
      - name: Setup Pure Native iOS Project
        run: |
          # 1. Create project.yml for XcodeGen
          cat << 'EOF' > project.yml
          name: ModMenu
          options:
            bundleIdPrefix: com.okphong
          targets:
            ModMenu:
              type: application
              platform: iOS
              deploymentTarget: "14.0"
              sources: [Sources]
              info:
                path: Info.plist
              settings:
                CODE_SIGNING_ALLOWED: NO
                CODE_SIGNING_REQUIRED: NO
                CODE_SIGN_IDENTITY: ""
                EXPANDED_CODE_SIGN_IDENTITY: ""
                PROVISIONING_PROFILE_SPECIFIER: ""
          EOF
          
          # 2. Create Info.plist (Bắt buộc phải có để build Native App)
          cat << 'EOF' > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleName</key>
              <string>ModMenu</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF
          
          # 3. Create Source Directory
          mkdir -p Sources
          
          # 4. Create AppDelegate.swift
          cat << 'EOF' > Sources/AppDelegate.swift
          import UIKit

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              var overlayWindow: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF
          
          # 4. Create ViewController.swift
          cat << 'EOF' > Sources/ViewController.swift
          import UIKit

          class ViewController: UIViewController {
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .black
                  
                  let label = UILabel(frame: CGRect(x: 20, y: 100, width: UIScreen.main.bounds.width - 40, height: 100))
                  label.text = "TrollStore Mod Menu\n(Pure Native iOS)"
                  label.textColor = .green
                  label.numberOfLines = 0
                  label.font = UIFont.boldSystemFont(ofSize: 24)
                  label.textAlignment = .center
                  view.addSubview(label)
                  
                  let btn = UIButton(frame: CGRect(x: 50, y: 300, width: UIScreen.main.bounds.width - 100, height: 60))
                  btn.backgroundColor = .green
                  btn.setTitle("BẬT MENU NỔI", for: .normal)
                  btn.setTitleColor(.black, for: .normal)
                  btn.titleLabel?.font = UIFont.boldSystemFont(ofSize: 20)
                  btn.layer.cornerRadius = 15
                  btn.addTarget(self, action: #selector(showMenu), for: .touchUpInside)
                  view.addSubview(btn)
              }
              
              @objc func showMenu() {
                  let appDelegate = UIApplication.shared.delegate as! AppDelegate
                  
                  if appDelegate.overlayWindow != nil { return }
                  
                  var overlay: UIWindow
                  if #available(iOS 13.0, *), let windowScene = UIApplication.shared.connectedScenes.first(where: { $0.activationState == .foregroundActive }) as? UIWindowScene {
                      overlay = UIWindow(windowScene: windowScene)
                  } else {
                      overlay = UIWindow(frame: UIScreen.main.bounds)
                  }
                  
                  overlay.frame = CGRect(x: 20, y: 150, width: 60, height: 60)
                  overlay.windowLevel = UIWindow.Level.statusBar + 1000
                  overlay.backgroundColor = .clear
                  
                  let vc = UIViewController()
                  vc.view.backgroundColor = .clear
                  overlay.rootViewController = vc
                  
                  let btn = UIButton(frame: CGRect(x: 0, y: 0, width: 60, height: 60))
                  btn.backgroundColor = .green
                  btn.layer.cornerRadius = 30
                  btn.layer.borderWidth = 2
                  btn.layer.borderColor = UIColor.white.cgColor
                  btn.setTitle("", for: .normal)
                  btn.setTitleColor(.black, for: .normal)
                  btn.titleLabel?.font = UIFont.boldSystemFont(ofSize: 30)
                  
                  let pan = UIPanGestureRecognizer(target: self, action: #selector(panGesture(_:)))
                  btn.addGestureRecognizer(pan)
                  
                  vc.view.addSubview(btn)
                  overlay.makeKeyAndVisible()
                  appDelegate.overlayWindow = overlay
                  
                  let alert = UIAlertController(title: "Thành Công", message: "Đã bật Menu Nổi TrollStore!", preferredStyle: .alert)
                  alert.addAction(UIAlertAction(title: "OK", style: .default, handler: nil))
                  self.present(alert, animated: true, completion: nil)
              }
              
              @objc func panGesture(_ gesture: UIPanGestureRecognizer) {
                  let appDelegate = UIApplication.shared.delegate as! AppDelegate
                  guard let window = appDelegate.overlayWindow else { return }
                  let translation = gesture.translation(in: nil)
                  window.center = CGPoint(x: window.center.x + translation.x, y: window.center.y + translation.y)
                  gesture.setTranslation(.zero, in: nil)
              }
          }
          EOF

          # 5. Create Entitlements
          cat << 'EOF' > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
              <key>com.apple.springboard.accessibility-window-hosting</key>
              <true/>
              <key>run-unsigned-code</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build Pure Native App
        run: |
          xcodebuild build -project ModMenu.xcodeproj -scheme ModMenu -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" SYMROOT=$PWD/build > xcodebuild_log.txt 2>&1 || (tail -n 200 xcodebuild_log.txt && exit 1)

      - name: Inject Entitlements & Package TIPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/ModMenu.app Payload/
          
          # Sign using TrollStore's official ldid
          ldid -Sentitlements.plist Payload/ModMenu.app/ModMenu
          
          zip -r ModMenu.tipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu-TrollStore
          path: ModMenu.tipa
