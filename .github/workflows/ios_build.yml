name: Build In-App Menu IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Create Flutter Project & Inject UI
        run: |
          flutter create .
          
          # Inject Flutter UI with Built-in Draggable Floating Menu
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'In-App Mod Menu',
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark(),
                home: const ModMenuOverlay(
                  child: MainAppScreen(),
                ),
              );
            }
          }

          class MainAppScreen extends StatelessWidget {
            const MainAppScreen({super.key});
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                appBar: AppBar(
                  title: const Text('Ứng dụng chính', style: TextStyle(color: Colors.green)),
                  backgroundColor: Colors.grey[900],
                  centerTitle: true,
                ),
                body: Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: const [
                      Icon(Icons.gamepad, size: 100, color: Colors.white54),
                      SizedBox(height: 20),
                      Text(
                        'Đây là ứng dụng bình thường.\nMenu  đã được gắn chết bên trong App!',
                        textAlign: TextAlign.center,
                        style: TextStyle(color: Colors.white70, fontSize: 18),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          class ModMenuOverlay extends StatefulWidget {
            final Widget child;
            const ModMenuOverlay({super.key, required this.child});

            @override
            State<ModMenuOverlay> createState() => _ModMenuOverlayState();
          }

          class _ModMenuOverlayState extends State<ModMenuOverlay> {
            Offset position = const Offset(20, 150);
            bool isMenuOpen = false;

            @override
            Widget build(BuildContext context) {
              return Stack(
                children: [
                  widget.child,
                  Positioned(
                    left: position.dx,
                    top: position.dy,
                    child: GestureDetector(
                      onPanUpdate: (details) {
                        setState(() {
                          position += details.delta;
                        });
                      },
                      child: Material(
                        color: Colors.transparent,
                        child: isMenuOpen ? _buildExpandedMenu() : _buildFloatingButton(),
                      ),
                    ),
                  ),
                ],
              );
            }

            Widget _buildFloatingButton() {
              return GestureDetector(
                onTap: () {
                  setState(() {
                    isMenuOpen = true;
                  });
                },
                child: Container(
                  width: 60,
                  height: 60,
                  decoration: BoxDecoration(
                    color: Colors.green,
                    shape: BoxShape.circle,
                    border: Border.all(color: Colors.white, width: 2),
                    boxShadow: const [
                      BoxShadow(color: Colors.black54, blurRadius: 10, offset: Offset(0, 4)),
                    ],
                  ),
                  child: const Center(
                    child: Text('', style: TextStyle(fontSize: 30, color: Colors.black)),
                  ),
                ),
              );
            }

            Widget _buildExpandedMenu() {
              return Container(
                width: 250,
                padding: const EdgeInsets.all(15),
                decoration: BoxDecoration(
                  color: Colors.black.withOpacity(0.95),
                  borderRadius: BorderRadius.circular(15),
                  border: Border.all(color: Colors.green, width: 2),
                  boxShadow: const [
                    BoxShadow(color: Colors.black54, blurRadius: 20),
                  ],
                ),
                child: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceBetween,
                      children: [
                        const Text('Mod Menu VIP', style: TextStyle(color: Colors.green, fontSize: 18, fontWeight: FontWeight.bold)),
                        IconButton(
                          icon: const Icon(Icons.close, color: Colors.red),
                          onPressed: () {
                            setState(() {
                              isMenuOpen = false;
                            });
                          },
                        )
                      ],
                    ),
                    const Divider(color: Colors.white24),
                    ListTile(
                      leading: const Icon(Icons.security, color: Colors.blue),
                      title: const Text('Bật Hack VIP', style: TextStyle(color: Colors.white, fontSize: 14)),
                      trailing: Switch(value: true, activeColor: Colors.green, onChanged: (v){}),
                      contentPadding: EdgeInsets.zero,
                    ),
                    ListTile(
                      leading: const Icon(Icons.speed, color: Colors.orange),
                      title: const Text('Tốc Độ x2', style: TextStyle(color: Colors.white, fontSize: 14)),
                      trailing: Switch(value: false, activeColor: Colors.green, onChanged: (v){}),
                      contentPadding: EdgeInsets.zero,
                    ),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Push Full Structure to Github
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Switch to In-App Floating Menu [skip ci]" || true
          git push origin main || true

      - name: Build Standard iOS App
        run: |
          # Vô hiệu hóa Code Signing trong project Xcode để tránh lỗi Build trên Github Actions
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' ios/Runner.xcodeproj/project.pbxproj || true
          
          # Dùng lệnh chuẩn của Flutter để build (Không dùng xcodebuild thủ công gây hỏng framework)
          flutter build ios --release --no-codesign

      - name: Package TIPA
        run: |
          mkdir -p Payload
          # Copy bộ nguồn CHUẨN của Flutter
          cp -r build/ios/iphoneos/Runner.app Payload/
          
          # Để App không bị văng trên TrollStore, bắt buộc phải Ký Trắng (Ad-hoc Sign) toàn bộ Frameworks
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign -s "-" -f {} \; || true
          find Payload/Runner.app/Frameworks -type f -name "*.dylib" -exec codesign -s "-" -f {} \; || true
          codesign -s "-" -f Payload/Runner.app/Runner || true
          codesign -s "-" -f Payload/Runner.app || true
          
          zip -r ModMenu-InApp.tipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu-InApp
          path: ModMenu-InApp.tipa
