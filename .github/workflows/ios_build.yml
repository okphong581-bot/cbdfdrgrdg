name: Build TrollStore Menu IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Create Flutter Project & Inject Native Code
        run: |
          # 1. Create base flutter project
          flutter create .
          
          # 2. Inject AppDelegate.swift with Floating Menu Code
          cat << 'EOF' > ios/Runner/AppDelegate.swift
          import UIKit
          import Flutter
          import AVFoundation

          @UIApplicationMain
          @objc class AppDelegate: FlutterAppDelegate {
            
            var floatingButtonWindow: UIWindow?
            var fullMenuWindow: UIWindow?
            
            // Audio Engine để giữ App sống mãi mãi khi thoát ra Home
            let engine = AVAudioEngine()
            let playerNode = AVAudioPlayerNode()

            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              GeneratedPluginRegistrant.register(with: self)
              
              keepAppAliveInBackground()
              
              DispatchQueue.main.asyncAfter(deadline: .now() + 1.0) {
                  self.setupFloatingMenu()
              }
              
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
            
            func keepAppAliveInBackground() {
                do {
                    try AVAudioSession.sharedInstance().setCategory(.playback, mode: .default, options: [.mixWithOthers])
                    try AVAudioSession.sharedInstance().setActive(true)
                } catch {
                    print("Lỗi AudioSession: \(error)")
                }
                
                guard let format = AVAudioFormat(standardFormatWithSampleRate: 44100.0, channels: 1),
                      let buffer = AVAudioPCMBuffer(pcmFormat: format, frameCapacity: 100) else { return }
                buffer.frameLength = 100
                
                engine.attach(playerNode)
                engine.connect(playerNode, to: engine.mainMixerNode, format: format)
                
                do {
                    try engine.start()
                    playerNode.scheduleBuffer(buffer, at: nil, options: .loops, completionHandler: nil)
                    playerNode.play()
                } catch {
                    print("Lỗi khởi động Engine: \(error)")
                }
            }
            
            func setupFloatingMenu() {
                // 1. Tạo nút nổi (Floating Button) nhỏ nhắn
                let btnWindow = UIWindow(frame: CGRect(x: 20, y: 150, width: 50, height: 50))
                btnWindow.windowLevel = UIWindow.Level.statusBar + 1000
                btnWindow.backgroundColor = .clear
                
                let btnVC = UIViewController()
                btnVC.view.backgroundColor = .clear
                btnWindow.rootViewController = btnVC
                
                let iconBtn = UIButton(frame: CGRect(x: 0, y: 0, width: 50, height: 50))
                iconBtn.backgroundColor = UIColor(red: 0.1, green: 0.1, blue: 0.1, alpha: 0.9)
                iconBtn.layer.cornerRadius = 25
                iconBtn.layer.borderWidth = 2
                iconBtn.layer.borderColor = UIColor.green.cgColor
                iconBtn.setTitle("", for: .normal)
                iconBtn.setTitleColor(.green, for: .normal)
                iconBtn.titleLabel?.font = UIFont.boldSystemFont(ofSize: 24)
                iconBtn.addTarget(self, action: #selector(toggleFullMenu), for: .touchUpInside)
                
                let panGesture = UIPanGestureRecognizer(target: self, action: #selector(handleBtnPan(_:)))
                btnVC.view.addGestureRecognizer(panGesture)
                
                btnVC.view.addSubview(iconBtn)
                btnWindow.makeKeyAndVisible()
                self.floatingButtonWindow = btnWindow
                
                // 2. Tạo Full Menu ẩn sẵn
                let menuWindow = UIWindow(frame: CGRect(x: 50, y: 200, width: 280, height: 320))
                menuWindow.windowLevel = UIWindow.Level.statusBar + 1001
                menuWindow.backgroundColor = .clear
                
                let menuVC = UIViewController()
                menuVC.view.backgroundColor = UIColor(red: 0.05, green: 0.05, blue: 0.05, alpha: 0.95)
                menuVC.view.layer.cornerRadius = 15
                menuVC.view.layer.borderWidth = 1
                menuVC.view.layer.borderColor = UIColor.green.cgColor
                menuWindow.rootViewController = menuVC
                
                let titleLabel = UILabel(frame: CGRect(x: 0, y: 10, width: 280, height: 30))
                titleLabel.text = "VIP MOD MENU"
                titleLabel.textColor = .green
                titleLabel.textAlignment = .center
                titleLabel.font = UIFont.boldSystemFont(ofSize: 18)
                menuVC.view.addSubview(titleLabel)
                
                let closeBtn = UIButton(frame: CGRect(x: 240, y: 10, width: 30, height: 30))
                closeBtn.setTitle("—", for: .normal)
                closeBtn.setTitleColor(.red, for: .normal)
                closeBtn.titleLabel?.font = UIFont.boldSystemFont(ofSize: 24)
                closeBtn.addTarget(self, action: #selector(toggleFullMenu), for: .touchUpInside)
                menuVC.view.addSubview(closeBtn)
                
                addToggle(to: menuVC.view, yPos: 60, title: "🎯 Aimbot Lock")
                addToggle(to: menuVC.view, yPos: 110, title: "👁️ Wallhack ESP")
                addToggle(to: menuVC.view, yPos: 160, title: "💀 Auto Headshot")
                
                let actionBtn = UIButton(frame: CGRect(x: 40, y: 240, width: 200, height: 45))
                actionBtn.backgroundColor = .green
                actionBtn.layer.cornerRadius = 8
                actionBtn.setTitle("INJECT HACK", for: .normal)
                actionBtn.setTitleColor(.black, for: .normal)
                actionBtn.titleLabel?.font = UIFont.boldSystemFont(ofSize: 16)
                actionBtn.addTarget(self, action: #selector(btnClicked), for: .touchUpInside)
                menuVC.view.addSubview(actionBtn)
                
                let menuPan = UIPanGestureRecognizer(target: self, action: #selector(handleMenuPan(_:)))
                menuVC.view.addGestureRecognizer(menuPan)
                
                menuWindow.isHidden = true
                self.fullMenuWindow = menuWindow
            }
            
            func addToggle(to view: UIView, yPos: CGFloat, title: String) {
                let label = UILabel(frame: CGRect(x: 20, y: yPos, width: 180, height: 30))
                label.text = title
                label.textColor = .white
                label.font = UIFont.systemFont(ofSize: 16)
                view.addSubview(label)
                
                let toggle = UISwitch(frame: CGRect(x: 210, y: yPos, width: 50, height: 30))
                toggle.onTintColor = .green
                view.addSubview(toggle)
            }
            
            @objc func toggleFullMenu() {
                guard let full = self.fullMenuWindow, let btn = self.floatingButtonWindow else { return }
                if full.isHidden {
                    full.isHidden = false
                    btn.isHidden = true
                } else {
                    full.isHidden = true
                    btn.isHidden = false
                }
            }
            
            @objc func btnClicked() {
                let alert = UIAlertController(title: "Thành Công", message: "Đã inject hệ thống thành công!", preferredStyle: .alert)
                alert.addAction(UIAlertAction(title: "OK", style: .default, handler: nil))
                self.fullMenuWindow?.rootViewController?.present(alert, animated: true, completion: nil)
            }
            
            @objc func handleBtnPan(_ gesture: UIPanGestureRecognizer) {
                guard let window = self.floatingButtonWindow, let view = window.rootViewController?.view else { return }
                let translation = gesture.translation(in: view)
                window.center = CGPoint(x: window.center.x + translation.x, y: window.center.y + translation.y)
                gesture.setTranslation(.zero, in: view)
            }
            
            @objc func handleMenuPan(_ gesture: UIPanGestureRecognizer) {
                guard let window = self.fullMenuWindow, let view = window.rootViewController?.view else { return }
                let translation = gesture.translation(in: view)
                window.center = CGPoint(x: window.center.x + translation.x, y: window.center.y + translation.y)
                gesture.setTranslation(.zero, in: view)
            }
          }
          EOF
          
          # 3. Add UIBackgroundModes to Info.plist to keep app alive when exiting
          cd ios/Runner
          plutil -insert UIBackgroundModes -array Info.plist
          plutil -insert UIBackgroundModes.0 -string "audio" Info.plist
          cd ../..
          
      - name: Create TrollStore Entitlements
        run: |
          cat << 'EOF' > entitlements.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
              <key>com.apple.springboard.accessibility-window-hosting</key>
              <true/>
              <key>run-unsigned-code</key>
              <true/>
              <key>get-task-allow</key>
              <true/>
              <key>task_for_pid-allow</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS App (No Codesign)
        run: |
          cd ios
          # Disable codesign in Xcode
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj || true
          
          flutter build ios --release --no-codesign || true
          
          # Force build with Xcode directly to get the .app output
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" SYMROOT=$PWD/../build/ios > xcodebuild_log.txt 2>&1 || (tail -n 200 xcodebuild_log.txt && exit 1)

      - name: Inject Entitlements & Package TIPA
        run: |
          # Install ldid to inject entitlements
          brew install ldid
          
          mkdir Payload
          # Copy the compiled .app
          cp -r build/ios/Release-iphoneos/Runner.app Payload/
          
          # Inject TrollStore Entitlements into the binary
          ldid -Sentitlements.plist Payload/Runner.app/Runner
          
          # Zip into .tipa format
          zip -r TrollMenu.tipa Payload

      - name: Upload TIPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollMenu-TrollStore
          path: TrollMenu.tipa
